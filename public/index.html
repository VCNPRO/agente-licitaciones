<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Licitaciones</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">Dashboard Agente de Licitaciones</h1>

        <div class="mb-4">
            <h2 class="text-xl font-semibold text-gray-700 mb-2">Estado del Agente</h2>
            <div id="agent-status" class="p-3 rounded-md text-center font-medium">
                Cargando...
            </div>
        </div>

        <div class="mb-4">
            <h2 class="text-xl font-semibold text-gray-700 mb-2">Total de Licitaciones Analizadas</h2>
            <div id="tender-count" class="p-3 bg-blue-100 text-blue-800 rounded-md text-center text-2xl font-bold">
                Cargando...
            </div>
        </div>

        <div class="mb-4">
            <h2 class="text-xl font-semibold text-gray-700 mb-2">Resumen de Última Ejecución</h2>
            <div id="last-execution-summary" class="p-3 bg-gray-100 text-gray-700 rounded-md text-center">
                Cargando...
            </div>
        </div>

        <div>
            <h2 class="text-xl font-semibold text-gray-700 mb-2">Errores Detectados</h2>
            <div id="errors-section" class="p-3 bg-green-100 text-green-800 rounded-md">
                No hay errores.
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const agentStatusElement = document.getElementById('agent-status');
            const tenderCountElement = document.getElementById('tender-count');
            const errorsSectionElement = document.getElementById('errors-section');
            const lastExecutionSummaryElement = document.getElementById('last-execution-summary');

            try {
                const response = await fetch('/api/dashboard-data');
                const data = await response.json();

                // Update Agent Status
                agentStatusElement.textContent = data.status;
                if (data.status === 'Activo') {
                    agentStatusElement.classList.add('bg-green-100', 'text-green-800');
                    agentStatusElement.classList.remove('bg-red-100', 'text-red-800');
                } else {
                    agentStatusElement.classList.add('bg-red-100', 'text-red-800');
                    agentStatusElement.classList.remove('bg-green-100', 'text-green-800');
                }

                // Update Tender Count
                tenderCountElement.textContent = data.licitacionesAnalizadas;

                // Update Last Execution Summary
                lastExecutionSummaryElement.textContent = data.lastExecutionSummary;

                // Update Errors Section
                if (data.errores && data.errores.length > 0) {
                    errorsSectionElement.classList.add('bg-red-100', 'text-red-800');
                    errorsSectionElement.classList.remove('bg-green-100', 'text-green-800');
                    errorsSectionElement.innerHTML = data.errores.map(err => `<p>${err.message}</p>`).join('');
                } else {
                    errorsSectionElement.textContent = 'No hay errores.';
                    errorsSectionElement.classList.add('bg-green-100', 'text-green-800');
                    errorsSectionElement.classList.remove('bg-red-100', 'text-red-800');
                }

            } catch (error) {
                console.error('Error fetching dashboard data:', error);
                agentStatusElement.textContent = 'Error al cargar';
                agentStatusElement.classList.add('bg-red-100', 'text-red-800');
                agentStatusElement.classList.remove('bg-green-100', 'text-green-800');
                tenderCountElement.textContent = 'N/A';
                lastExecutionSummaryElement.textContent = 'Error al cargar resumen.';
                errorsSectionElement.textContent = 'Error de conexión con la API.';
                errorsSectionElement.classList.add('bg-red-100', 'text-red-800');
                errorsSectionElement.classList.remove('bg-green-100', 'text-red-800');
            }
        });
    </script>
</body>
</html>
